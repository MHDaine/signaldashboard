services:
  - type: web
    name: signal-dashboard
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: "3.13"
      - key: API_AUTH_TOKEN
        sync: false
      - key: OPENAI_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: REDDIT_CLIENT_ID
        sync: false
      - key: REDDIT_CLIENT_SECRET
        sync: false
      - key: CRUSTDATA_API_KEY
        sync: false
      - key: GOOGLE_SHEET_ID
        sync: false
      - key: GCP_SERVICE_ACCOUNT_JSON
        sync: false
      - key: FIREBASE_SERVICE_ACCOUNT_JSON
        sync: false
      - key: COLLECTION
        value: "mh_newsletter"
    disk:
      name: signal-data
      mountPath: /data/outputs
      sizeGB: 1